<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background -->
  <rect width="512" height="512" fill="white"/>
  
  <!-- Group with isometric rotation -->
  <g stroke="black" stroke-linejoin="round" stroke-linecap="round">
    
    <!-- Connecting Vertical/Graph Lines (Behind Planes) -->
    <line x1="256" y1="130" x2="256" y2="370" stroke-width="8" stroke-dasharray="8 8"/>
    <line x1="184" y1="155" x2="328" y2="275" stroke-width="6" stroke-dasharray="6 6"/>
    <line x1="328" y1="155" x2="184" y2="395" stroke-width="6" stroke-dasharray="6 6"/>
    
    <!-- Layer 3 (Bottom - Global Memory) -->
    <polygon points="256,320 400,370 256,420 112,370" fill="none" stroke-width="8"/>
    <circle cx="256" cy="370" r="14" fill="black"/>
    <circle cx="184" cy="395" r="10" fill="black"/>
    <circle cx="328" cy="345" r="10" fill="white" stroke-width="6"/>

    <!-- Layer 2 (Middle - Domain Memory) -->
    <polygon points="256,200 400,250 256,300 112,250" fill="white" stroke-width="8"/>
    <line x1="256" y1="250" x2="184" y2="275" stroke-width="4"/>
    <line x1="256" y1="250" x2="328" y2="225" stroke-width="4"/>
    <circle cx="256" cy="250" r="14" fill="black"/>
    <circle cx="184" cy="275" r="10" fill="white" stroke-width="6"/>
    <circle cx="328" cy="225" r="10" fill="black"/>
    <circle cx="328" cy="275" r="12" fill="black"/> <!-- Intersect node -->

    <!-- Layer 1 (Top - Task Memory) -->
    <polygon points="256,80 400,130 256,180 112,130" fill="white" stroke-width="8"/>
    <line x1="256" y1="130" x2="184" y2="155" stroke-width="4"/>
    <line x1="256" y1="130" x2="328" y2="155" stroke-width="4"/>
    <circle cx="256" cy="130" r="14" fill="black"/>
    <circle cx="184" cy="155" r="10" fill="black"/>
    <circle cx="328" cy="155" r="10" fill="white" stroke-width="6"/>

    <!-- Front Connecting Lines (Overlapping) -->
    <line x1="184" y1="275" x2="256" y2="370" stroke-width="6"/>
    <line x1="328" y1="225" x2="256" y2="130" stroke-width="6"/>
  </g>
</svg>