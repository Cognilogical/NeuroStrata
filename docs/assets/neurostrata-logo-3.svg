<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background -->
  <rect width="512" height="512" fill="white"/>

  <g stroke="black" stroke-linecap="round" stroke-linejoin="round">
    <!-- Horizontal Strata (3 Layers) -->
    <!-- Top Layer (Task) -->
    <rect x="80" y="100" width="352" height="60" rx="15" fill="none" stroke-width="8"/>
    <!-- Middle Layer (Domain) -->
    <rect x="80" y="226" width="352" height="60" rx="15" fill="none" stroke-width="8"/>
    <!-- Bottom Layer (Global) -->
    <rect x="80" y="352" width="352" height="60" rx="15" fill="none" stroke-width="8"/>

    <!-- Vertical / Diagonal Connections (Graph) -->
    <!-- Connection 1 -->
    <line x1="160" y1="130" x2="220" y2="256" stroke-width="6"/>
    <line x1="220" y1="256" x2="160" y2="382" stroke-width="6" stroke-dasharray="8 8"/>
    
    <!-- Connection 2 -->
    <line x1="352" y1="130" x2="300" y2="256" stroke-width="6" stroke-dasharray="8 8"/>
    <line x1="300" y1="256" x2="352" y2="382" stroke-width="6"/>

    <!-- Horizontal Connections -->
    <line x1="160" y1="130" x2="352" y2="130" stroke-width="4" stroke-dasharray="4 4"/>
    <line x1="220" y1="256" x2="300" y2="256" stroke-width="4"/>
    <line x1="160" y1="382" x2="352" y2="382" stroke-width="4" stroke-dasharray="4 4"/>

    <!-- Nodes -->
    <!-- Top -->
    <circle cx="160" cy="130" r="14" fill="black"/>
    <circle cx="256" cy="130" r="10" fill="white" stroke-width="6"/>
    <circle cx="352" cy="130" r="14" fill="white" stroke-width="6"/>

    <!-- Middle -->
    <circle cx="220" cy="256" r="16" fill="black"/>
    <circle cx="300" cy="256" r="12" fill="white" stroke-width="6"/>

    <!-- Bottom -->
    <circle cx="160" cy="382" r="14" fill="white" stroke-width="6"/>
    <circle cx="256" cy="382" r="10" fill="black"/>
    <circle cx="352" cy="382" r="14" fill="black"/>
  </g>
</svg>