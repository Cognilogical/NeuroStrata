<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background -->
  <rect width="512" height="512" fill="white"/>

  <g transform="translate(256, 256)" stroke="black" stroke-linejoin="round" stroke-linecap="round">
    
    <!-- Outer Hexagon representing structured memory core -->
    <polygon points="0,-180 156,-90 156,90 0,180 -156,90 -156,-90" fill="none" stroke-width="12"/>

    <!-- Y-Shaped Internal Boundaries (Creating 3 main 3D-like strata/quadrants) -->
    <!-- Top Strata, Left Strata, Right Strata -->
    <line x1="0" y1="0" x2="0" y2="180" stroke-width="12" stroke-dasharray="12 12"/>
    <line x1="0" y1="0" x2="-156" y2="-90" stroke-width="12" stroke-dasharray="12 12"/>
    <line x1="0" y1="0" x2="156" y2="-90" stroke-width="12" stroke-dasharray="12 12"/>

    <!-- Graph Connections Piercing Through the Quadrants -->
    <line x1="0" y1="-100" x2="80" y2="40" stroke-width="6"/>
    <line x1="80" y1="40" x2="-80" y2="40" stroke-width="6"/>
    <line x1="-80" y1="40" x2="0" y2="-100" stroke-width="6"/>
    
    <line x1="0" y1="-100" x2="120" y2="-30" stroke-width="4" stroke-dasharray="4 4"/>
    <line x1="0" y1="-100" x2="-120" y2="-30" stroke-width="4" stroke-dasharray="4 4"/>
    
    <line x1="-80" y1="40" x2="0" y2="120" stroke-width="4" stroke-dasharray="4 4"/>
    <line x1="80" y1="40" x2="0" y2="120" stroke-width="4" stroke-dasharray="4 4"/>

    <!-- Data Nodes -->
    <!-- Core Node -->
    <circle cx="0" cy="0" r="18" fill="white" stroke-width="8"/>
    
    <!-- Quadrant Center Nodes -->
    <!-- Top (Task) -->
    <circle cx="0" cy="-100" r="16" fill="black"/>
    <!-- Bottom Right (Domain) -->
    <circle cx="80" cy="40" r="14" fill="white" stroke-width="6"/>
    <circle cx="120" cy="-30" r="10" fill="black"/>
    <!-- Bottom Left (Global) -->
    <circle cx="-80" cy="40" r="14" fill="black"/>
    <circle cx="-120" cy="-30" r="10" fill="white" stroke-width="6"/>
    <!-- True Bottom Connector Node -->
    <circle cx="0" cy="120" r="12" fill="white" stroke-width="6"/>
    
    <!-- Outer Corners -->
    <circle cx="0" cy="-180" r="12" fill="black"/>
    <circle cx="156" cy="-90" r="12" fill="white" stroke-width="6"/>
    <circle cx="156" cy="90" r="12" fill="black"/>
    <circle cx="0" cy="180" r="12" fill="white" stroke-width="6"/>
    <circle cx="-156" cy="90" r="12" fill="black"/>
    <circle cx="-156" cy="-90" r="12" fill="white" stroke-width="6"/>
  </g>
</svg>