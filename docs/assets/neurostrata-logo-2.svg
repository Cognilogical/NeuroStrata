<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background -->
  <rect width="512" height="512" fill="white"/>

  <g transform="translate(256, 256)" stroke="black" stroke-linejoin="round" stroke-linecap="round">
    
    <!-- Strata (3 Rings) -->
    <circle cx="0" cy="0" r="180" fill="none" stroke-width="6"/>
    <circle cx="0" cy="0" r="120" fill="none" stroke-width="6" stroke-dasharray="8 8"/>
    <circle cx="0" cy="0" r="60" fill="none" stroke-width="6"/>

    <!-- Graph Connections crossing planes -->
    <!-- Inter-ring connections -->
    <line x1="0" y1="-60" x2="60" y2="-104" stroke-width="5"/>
    <line x1="60" y1="-104" x2="0" y2="-180" stroke-width="5"/>
    
    <line x1="52" y1="30" x2="120" y2="0" stroke-width="5"/>
    <line x1="120" y1="0" x2="155" y2="90" stroke-width="5"/>
    
    <line x1="-30" y1="52" x2="-85" y2="85" stroke-width="5"/>
    <line x1="-85" y1="85" x2="-127" y2="127" stroke-width="5"/>

    <line x1="-52" y1="-30" x2="-104" y2="-60" stroke-width="5"/>
    <line x1="-104" y1="-60" x2="-180" y2="0" stroke-width="5"/>

    <!-- Network Nodes (Dots) -->
    <!-- Inner Tier -->
    <circle cx="0" cy="-60" r="12" fill="black"/>
    <circle cx="52" cy="30" r="10" fill="white" stroke-width="5"/>
    <circle cx="-30" cy="52" r="10" fill="black"/>
    <circle cx="-52" cy="-30" r="10" fill="white" stroke-width="5"/>

    <!-- Middle Tier -->
    <circle cx="60" cy="-104" r="14" fill="black"/>
    <circle cx="120" cy="0" r="12" fill="white" stroke-width="5"/>
    <circle cx="-85" cy="85" r="12" fill="black"/>
    <circle cx="-104" cy="-60" r="10" fill="black"/>

    <!-- Outer Tier -->
    <circle cx="0" cy="-180" r="16" fill="white" stroke-width="6"/>
    <circle cx="155" cy="90" r="14" fill="black"/>
    <circle cx="-127" cy="127" r="12" fill="white" stroke-width="6"/>
    <circle cx="-180" cy="0" r="14" fill="black"/>
    <circle cx="-80" cy="-160" r="10" fill="black"/> <!-- Floating node -->
    
    <!-- Cross Tier Connection -->
    <path d="M 0 -60 Q -100 -120 -80 -160 T -180 0" fill="none" stroke-width="4" stroke-dasharray="6 6"/>

    <!-- Center Core -->
    <circle cx="0" cy="0" r="16" fill="black"/>
  </g>
</svg>