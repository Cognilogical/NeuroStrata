version: '3.8'

services:
  qdrant:
    image: docker.io/qdrant/qdrant:latest
    container_name: strata-qdrant
    labels:
      - "strata.role=memory"
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # Example local embedder using Ollama
  # Users can swap this out for Llama.cpp, Text-Embeddings-Inference, etc.
  embedder:
    image: docker.io/ollama/ollama:latest
    container_name: strata-embedder
    labels:
      - "strata.role=memory"
    ports:
      - "8004:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    # Uncomment the command below to auto-pull the nomic model on start
    # command: bash -c "ollama serve & sleep 5 && ollama pull nomic-embed-text && wait"

volumes:
  qdrant_data:
  ollama_data:
